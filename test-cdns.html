<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 14px; }
    .success { color: green; }
    .error { color: red; }
    .btn { padding: 10px 20px; margin: 5px; }
  </style>
</head>
<body>
  <h1>🔧 CDN 测试</h1>
  
  <button class="btn" onclick="testCDN1()">测试 CDN 1</button>
  <button class="btn" onclick="testCDN2()">测试 CDN 2</button>
  <button class="btn" onclick="testCDN3()">测试 CDN 3</button>
  
  <div class="log" id="log"></div>

  <script>
    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const color = type === 'success' ? 'green' : type === 'error' ? 'red' : 'gray';
      logDiv.innerHTML += `<p style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</p>`;
    }
    
    async function testCDN1() {
      log('=== 测试 CDN 1: unpkg ===');
      try {
        const response = await fetch('https://unpkg.com/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js');
        if (response.ok) {
          log('✅ CDN 1 可访问', 'success');
        } else {
          log('❌ CDN 1 不可访问', 'error');
        }
      } catch (e) {
        log('❌ CDN 1 错误: ' + e.message, 'error');
      }
    }
    
    async function testCDN2() {
      log('=== 测试 CDN 2: jsdelivr ===');
      try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/dist/umd/supabase.min.js');
        if (response.ok) {
          log('✅ CDN 2 可访问', 'success');
        } else {
          log('❌ CDN 2 不可访问', 'error');
        }
      } catch (e) {
        log('❌ CDN 2 错误: ' + e.message, 'error');
      }
    }
    
    async function testCDN3() {
      log('=== 测试 CDN 3: esm 格式 ===');
      try {
        const response = await fetch('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.38.4/esm/index.js');
        if (response.ok) {
          log('✅ CDN 3 可访问', 'success');
        } else {
          log('❌ CDN 3 不可访问', 'error');
        }
      } catch (e) {
        log('❌ CDN 3 错误: ' + e.message, 'error');
      }
    }
  </script>
</body>
</html>
