<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网络测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .btn { padding: 10px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🌐 网络连接测试</h1>
  
  <button class="btn" onclick="testConnection()">测试连接</button>
  
  <div id="results"></div>

  <script>
    const supabaseUrl = 'https://hllhspywaownmevhlite.supabase.co';
    
    async function testConnection() {
      const results = document.getElementById('results');
      results.innerHTML = '<p>正在测试...</p>';
      
      try {
        // 测试1: 连接到 Supabase
        const response = await fetch(`${supabaseUrl}/auth/v1/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'test@test.com', password: '123456' }),
          mode: 'cors'
        });
        
        if (response.ok) {
          results.innerHTML += '<div class="result success">✅ 可以连接到 Supabase API</div>';
        } else {
          const text = await response.text();
          if (text.includes('email already registered') || response.status === 400) {
            results.innerHTML += '<div class="result success">✅ 可以连接到 Supabase API（已有用户）</div>';
          } else {
            results.innerHTML += `<div class="result error">❌ 连接失败: ${response.status} - ${text}</div>`;
          }
        }
      } catch (error) {
        results.innerHTML += `<div class="result error">❌ 网络错误: ${error.message}</div>`;
        results.innerHTML += '<p>可能的原因：</p>';
        results.innerHTML += '<ul>';
        results.innerHTML += '<li>VPN 未正确连接</li>';
        results.innerHTML += '<li>网络防火墙阻止连接</li>';
        results.innerHTML += '<li>DNS 解析问题</li>';
        results.innerHTML += '</ul>';
      }
    }
  </script>
</body>
</html>
