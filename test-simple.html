<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简单测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .btn { padding: 10px 20px; margin: 5px; cursor: pointer; }
    .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>🔧 简单测试</h1>
  
  <button class="btn" onclick="test1()">测试按钮1</button>
  <button class="btn" onclick="test2()">测试按钮2</button>
  
  <div class="log" id="log"></div>

  <script>
    function log(msg) {
      document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
    }
    
    function test1() {
      log('按钮1被点击了！');
    }
    
    function test2() {
      log('按钮2被点击了！时间: ' + new Date().toLocaleTimeString());
    }
    
    log('页面加载完成！');
  </script>
</body>
</html>
